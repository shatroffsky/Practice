<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Аватар</title>
    <link rel="stylesheet" href="/static/style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body class="dark">

<div id="sidebar">
    <h2>Аватар</h2>

    <div class="control-group">
        <label>🎨 Тема</label>
        <select id="themeSelect" class="styled-select">
            <option value="dark">Темна (Dark)</option>
            <option value="light">Світла (Light)</option>
        </select>
    </div>

    <div class="control-group">
        <label>📄 Дані емоцій (JSON)</label>
        <div class="file-upload-wrapper">
            <label class="custom-file-upload upload-highlight">
                <input type="file" id="jsonInput" accept=".json">
                <span id="fileName">📁 Вибрати файл...</span>
            </label>
            <button id="clearJsonBtn" title="Очистити файл">❌</button>
        </div>
    </div>

    <div id="status">😐 Очікування...</div>

    <div class="control-group">
        <label>🎚 Інтенсивність</label>
        <input type="range" id="intensitySlider" min="0" max="1.5" step="0.01" value="1">
    </div>

    <hr>

    <h3>🧪 Тест емоцій</h3>
    <div class="emotions-grid">
        <button class="emotion-btn" onclick="setEmotion('Happy', 1)">😊 Щастя</button>
        <button class="emotion-btn" onclick="setEmotion('Angry', 1)">😠 Злість</button>
        <button class="emotion-btn" onclick="setEmotion('Sad', 1)">😢 Сум</button>
        <button class="emotion-btn" onclick="setEmotion('Excited', 1)">🤩 Захват</button>
        <button class="emotion-btn" onclick="setEmotion('unpleasant', 1)">🤢 Відраза</button>
        <button class="emotion-btn" onclick="setEmotion('suspicious', 1)">🤨 Підозра</button>
        <button class="emotion-btn" onclick="setEmotion('Sleepy', 1)">🥱 Сонлив.</button>
        <button class="emotion-btn" onclick="setEmotion('Sleep', 1)">😴 Сон</button>
    </div>

    <button class="reset-btn" onclick="setEmotion('Нейтральна', 0)">😐 Скинути емоцію</button>

    <hr>

    <h3>💾 Збереження</h3>
    <button id="downloadPNG" class="download-btn">📸 Зберегти як PNG</button>
</div>

<div id="canvas-container"></div>

<script type="module" src="/static/app.js"></script>

</body>
</html>
